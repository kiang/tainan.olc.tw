<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta property="og:title" content="社會住宅地圖">
    <meta property="og:description" content="全國社會住宅個案興辦執行情形">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://tainan.olc.tw/p/social_housing/og_image.png">
    <title>社會住宅地圖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="//maxcdn.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
        }

        html,
        body,
        #map {
            height: 100%;
        }

        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 380px;
            background: white;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-380px);
        }

        .sidebar-toggle {
            position: absolute;
            top: 10px;
            left: 390px;
            z-index: 1001;
            background: white;
            border: none;
            border-radius: 0 8px 8px 0;
            padding: 10px 8px;
            box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: left 0.3s ease;
        }

        .sidebar.collapsed+.sidebar-toggle {
            left: 10px;
            border-radius: 8px;
        }

        .sidebar-header {
            padding: 15px;
            background: #2c3e50;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .sidebar-header h5 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .filter-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .filter-btn {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: transparent;
            color: white;
            cursor: pointer;
        }

        .filter-btn.active {
            background: white;
            color: #2c3e50;
        }

        .city-filter {
            width: 100%;
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .search-input {
            width: 100%;
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .item-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .item-card {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-card:hover {
            background: #f5f5f5;
        }

        .item-card.active {
            background: #d4efdf;
        }

        .item-card.expired {
            border: 2px solid #e74c3c;
        }

        .leaflet-top.leaflet-left {
            right: 10px;
            left: auto;
        }

        .item-card .name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .item-card .meta {
            font-size: 12px;
            color: #666;
        }

        .item-card .no-coords {
            color: #e74c3c;
            font-size: 11px;
        }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
        }

        .status-新完工 {
            background: #27ae60;
        }

        .status-興建中 {
            background: #f39c12;
        }

        .status-已決標待開工 {
            background: #3498db;
        }

        .status-既有 {
            background: #8e44ad;
        }

        .status-規劃中 {
            background: #95a5a6;
        }

        .stats-bar {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
        }

        .leaflet-popup-content {
            font-family: 'Noto Sans TC', sans-serif;
            min-width: 200px;
        }

        .leaflet-popup-content h4 {
            margin: 0 0 10px 0;
            font-size: 16px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 5px;
        }

        .leaflet-popup-content table td {
            padding: 3px 8px;
            font-size: 13px;
        }

        .leaflet-popup-content table td:first-child {
            color: #666;
            font-weight: 500;
            white-space: nowrap;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 420px;
            width: 90%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-box h4 {
            margin: 0 0 12px 0;
            font-size: 18px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 8px;
        }

        .modal-box table { width: 100%; }

        .modal-box table td {
            padding: 5px 8px;
            font-size: 14px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-box table td:first-child {
            color: #666;
            font-weight: 500;
            white-space: nowrap;
        }

        .modal-close {
            position: absolute;
            top: 10px; right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }

        .modal-close:hover { color: #333; }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }

            .sidebar.collapsed+.sidebar-toggle {
                left: 10px;
            }

            .sidebar-toggle {
                left: calc(100%);
            }
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h5>社會住宅地圖</h5>
            <div class="filter-group" id="statusFilter">
                <button class="filter-btn active" data-status="all">全部</button>
                <button class="filter-btn" data-status="新完工">新完工</button>
                <button class="filter-btn" data-status="興建中">興建中</button>
                <button class="filter-btn" data-status="已決標待開工">已決標待開工</button>
                <button class="filter-btn" data-status="既有">既有</button>
            </div>
            <select id="cityFilter" class="city-filter">
                <option value="">全部縣市</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="搜尋案名、縣市或興辦主體...">
            <div class="stats-bar" id="statsBar"></div>
        </div>
        <ul class="item-list" id="itemList"></ul>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fa fa-bars"></i>
    </button>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
