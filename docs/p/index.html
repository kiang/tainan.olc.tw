<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="utf-8">
    <title>公共資料專案總覽</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ1JR851SJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-FJ1JR851SJ');
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .content-wrapper {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin: 20px auto;
            padding: 0;
            max-width: 1400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: none;
            border-radius: 20px 20px 0 0;
            padding: 1rem 2rem;
        }
        
        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: 600;
        }
        
        .navbar-brand:hover, .nav-link:hover {
            color: rgba(255, 255, 255, 0.8) !important;
        }
        
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            margin: -1.5rem -1.5rem 2rem -1.5rem;
            border-radius: 0 0 30px 30px;
        }
        
        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .hero-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        
        .search-container {
            background: white;
            border-radius: 50px;
            padding: 0.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-input {
            border: none;
            outline: none;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 50px;
            width: 100%;
            background: transparent;
        }
        
        .search-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.3rem;
        }
        
        .stats-section {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            color: white;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .main-content {
            padding: 2rem;
        }
        
        .filter-section {
            margin-bottom: 2rem;
        }
        
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        
        .filter-chip {
            padding: 0.5rem 1rem;
            border-radius: 25px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .filter-chip:hover, .filter-chip.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .project-card {
            transition: all 0.3s ease;
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            background: white;
            height: 100%;
            overflow: hidden;
        }
        
        .project-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .project-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 1rem;
            line-height: 1.4;
            flex-grow: 1;
        }
        
        .category-badge {
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-weight: 500;
            display: inline-block;
            margin-top: auto;
        }
        
        /* Category-specific colors */
        .badge-政治 { background: #e8f4fd; color: #1976d2; }
        .badge-交通 { background: #f3e5f5; color: #7b1fa2; }
        .badge-健康 { background: #e8f5e8; color: #388e3c; }
        .badge-教育 { background: #fff3e0; color: #f57c00; }
        .badge-環境 { background: #e0f2f1; color: #00695c; }
        .badge-災害 { background: #ffebee; color: #d32f2f; }
        .badge-金融 { background: #f1f8e9; color: #689f38; }
        .badge-社區 { background: #fce4ec; color: #c2185b; }
        .badge-能源 { background: #fff8e1; color: #ffa000; }
        .badge-建築 { background: #f3e5f5; color: #512da8; }
        .badge-勞動 { background: #e1f5fe; color: #0277bd; }
        
        .footer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            border-radius: 0 0 20px 20px;
            margin-top: 3rem;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer a:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .hero-subtitle { font-size: 1rem; }
            .stats-section { gap: 1rem; }
            .main-content { padding: 1rem; }
        }
        
        .loading-animation {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <i class="bi bi-geo-alt-fill me-2"></i>
                    公共資料專案總覽
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="https://github.com/kiang/tainan.olc.tw" target="_blank">
                                <i class="bi bi-github me-1"></i> GitHub
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="hero-section">
            <div class="container">
                <h1 class="hero-title">
                    <i class="bi bi-database-fill me-2"></i>
                    公共資料專案總覽
                </h1>
                <p class="hero-subtitle">探索台灣公共資料的力量，讓資訊成為改變社會的動力</p>
                
                <div class="search-container position-relative">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜尋專案名稱、類別或關鍵字...">
                    <i class="bi bi-search search-icon"></i>
                </div>
                
                <div class="stats-section">
                    <div class="stat-item">
                        <span class="stat-number" id="totalProjects">…</span>
                        <span class="stat-label">個專案</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">11</span>
                        <span class="stat-label">個分類</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">∞</span>
                        <span class="stat-label">種可能</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="filter-section">
                <div class="filter-chips">
                    <span class="filter-chip active" data-category="all">全部</span>
                    <span class="filter-chip" data-category="政治">政治</span>
                    <span class="filter-chip" data-category="交通">交通</span>
                    <span class="filter-chip" data-category="健康">健康</span>
                    <span class="filter-chip" data-category="教育">教育</span>
                    <span class="filter-chip" data-category="環境">環境</span>
                    <span class="filter-chip" data-category="災害">災害</span>
                    <span class="filter-chip" data-category="金融">金融</span>
                    <span class="filter-chip" data-category="社區">社區</span>
                    <span class="filter-chip" data-category="能源">能源</span>
                    <span class="filter-chip" data-category="建築">建築</span>
                    <span class="filter-chip" data-category="勞動">勞動</span>
                </div>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="projectList">
                <!-- cards rendered by JS from projects.json -->
            </div>
        </div>

        <footer class="footer">
            <div class="container text-center">
                <p class="mb-0">© 2024 公共資料專案總覽 | <a href="https://facebook.com/k.olc.tw/" target="_blank">江明宗</a></p>
                <p class="mt-2 mb-0">
                    <small>讓公共資料成為改變社會的力量 | Powered by Open Data</small>
                </p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allProjects = [];
        let activeCategory = 'all';
        let searchText = '';

        function renderCards(projects) {
            const list = document.getElementById('projectList');
            list.innerHTML = projects.map((p, i) => `
                <div class="col loading-animation" data-category="${p.category}" style="animation-delay:${(i % 30) * 0.05}s">
                    <a href="${p.href}" class="text-decoration-none">
                        <div class="card project-card h-100">
                            <div class="card-body">
                                <i class="bi ${p.icon} project-icon"></i>
                                <h5 class="card-title">${p.title}</h5>
                                <span class="category-badge badge-${p.category}">${p.category}</span>
                            </div>
                        </div>
                    </a>
                </div>`).join('');
            document.getElementById('totalProjects').textContent = projects.length;
            observeCards();
        }

        function applyFilters() {
            let filtered = allProjects;
            if (activeCategory !== 'all') {
                filtered = filtered.filter(p => p.category === activeCategory);
            }
            if (searchText) {
                filtered = filtered.filter(p => p.title.toLowerCase().includes(searchText));
            }
            renderCards(filtered);
        }

        function observeCards() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.loading-animation').forEach(c => observer.observe(c));
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchText = e.target.value.toLowerCase();
            applyFilters();
        });

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                activeCategory = this.dataset.category;
                document.getElementById('searchInput').value = '';
                searchText = '';
                applyFilters();
            });
        });

        fetch('projects.json')
            .then(r => r.json())
            .then(data => {
                allProjects = data;
                renderCards(allProjects);
            });
    </script>
</body>
</html>
