<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校園食材登錄平臺評分工具 - 好吃還是難吃？</title>
  <meta name="description" content="讓學生為學校午餐菜色評分！選擇學校、日期與供應商，滑動評分每道菜，並分享你的評分結果。資料來源：校園食材登錄平臺。">
  <meta name="keywords" content="校園食材,學校午餐,菜色評分,校園餐點,供應商,食材登錄">
  <meta name="author" content="Finjon Kiang">
  <meta property="og:title" content="校園食材登錄平臺評分工具">
  <meta property="og:description" content="讓學生為學校午餐菜色評分！選擇學校、日期與供應商，滑動評分每道菜。">
  <meta property="og:url" content="https://tainan.olc.tw/p/fatraceschool/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://tainan.olc.tw/p/fatraceschool/og_image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="校園食材登錄平臺評分工具">
  <meta name="twitter:description" content="讓學生為學校午餐菜色評分！選擇學校、日期與供應商，滑動評分每道菜。">
  <link rel="stylesheet" href="css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ1JR851SJ"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());

      gtag('config', 'G-FJ1JR851SJ');
  </script>
</head>
<body>

<header>
  <h1>🍱 校園菜色評分</h1>
  <p>好吃還是難吃？滑一滑來評分吧！</p>
</header>

<!-- Setup Panel -->
<div class="setup-panel" id="setupPanel">
  <h2>🏫 選擇你的學校</h2>

  <div class="form-group">
    <label>📍 縣市</label>
    <div class="ssd-wrap" id="countyWrap">
      <div class="ssd-display" id="countyDisplay" tabindex="0">載入中...<span class="ssd-arrow">▼</span></div>
      <div class="ssd-dropdown" id="countyDropdown">
        <input class="ssd-search" type="text" placeholder="🔍 搜尋縣市..." id="countySearch">
        <div class="ssd-list" id="countyList"></div>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>🗺️ 鄉鎮市區</label>
    <div class="ssd-wrap" id="areaWrap">
      <div class="ssd-display" id="areaDisplay" tabindex="0">請先選縣市<span class="ssd-arrow">▼</span></div>
      <div class="ssd-dropdown" id="areaDropdown">
        <input class="ssd-search" type="text" placeholder="🔍 搜尋鄉鎮市區..." id="areaSearch">
        <div class="ssd-list" id="areaList"></div>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>🏫 學校</label>
    <div class="ssd-wrap" id="schoolWrap">
      <div class="ssd-display" id="schoolDisplay" tabindex="0">請先選鄉鎮市區<span class="ssd-arrow">▼</span></div>
      <div class="ssd-dropdown" id="schoolDropdown">
        <input class="ssd-search" type="text" placeholder="🔍 搜尋學校..." id="schoolSearch">
        <div class="ssd-list" id="schoolList"></div>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>📅 查詢日期</label>
    <input type="date" id="dateInput">
  </div>

  <button class="btn-primary" id="startBtn" onclick="startRating()">出發評分！🍽️</button>
  <div class="error-msg" id="setupError" style="display:none"></div>
</div>

<!-- Kitchen Picker Panel -->
<div class="kitchen-panel" id="kitchenPanel">
  <h2>🍳 你今天吃哪一家的餐點？</h2>
  <p class="kitchen-hint">點選看起來像你午餐的那一組菜！</p>
  <div class="kitchen-loading" id="kitchenLoading">
    <div class="spinner"></div>載入菜色中...
  </div>
  <div class="kitchen-cards" id="kitchenCards"></div>
</div>

<!-- Swipe Panel -->
<div class="swipe-container" id="swipePanel">
  <div class="progress-label" id="progressLabel"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="card-stack" id="cardStack"></div>

  <div class="hint-text">👈 難吃 &nbsp;｜&nbsp; 拖曳或按鈕 &nbsp;｜&nbsp; 好吃 👉</div>

  <div class="vote-buttons">
    <button class="vote-btn nope" onclick="vote('nope')" title="難吃">😖</button>
    <button class="vote-btn skip" onclick="vote('skip')" title="跳過">⏭</button>
    <button class="vote-btn like" onclick="vote('like')" title="好吃">😋</button>
  </div>
</div>

<!-- Results Panel -->
<div class="results-panel" id="resultsPanel">
  <h2>🏆 評分結果出爐！</h2>
  <div class="summary-row" id="summaryRow"></div>
  <div class="result-columns">
    <div class="result-col">
      <div class="result-col-header good">😋 好吃的菜</div>
      <div class="gallery" id="likedGallery"></div>
      <div class="result-empty" id="likedEmpty" style="display:none">沒有選好吃的菜 😢</div>
    </div>
    <div class="result-col">
      <div class="result-col-header bad">😖 難吃的菜</div>
      <div class="gallery" id="nopedGallery"></div>
      <div class="result-empty" id="nopedEmpty" style="display:none">沒有選難吃的菜 🎉</div>
    </div>
  </div>
  <button class="btn-primary" onclick="backToSetup()">再評一次！🔄</button>
  <button class="btn-secondary" id="shareBtn" onclick="shareResults()">分享結果 📤</button>
</div>

<script src="js/main.js"></script>
<footer style="text-align:center;padding:8px;font-size:0.85em;color:#6c757d;">

</footer>
</body>
</html>
