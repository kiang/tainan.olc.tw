<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="utf-8">
    <meta property="og:title" content="2026 台灣選舉候選人地圖">
    <meta property="og:description" content="透過地圖瀏覽 2026 年台灣各項選舉候選人資訊">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://tainan.olc.tw/p/2026/og_image.png">
    <title>2026 台灣選舉候選人地圖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .lang-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }

        .back-btn {
            position: absolute;
            top: 10px;
            left: 55px;
            z-index: 1000;
            display: none;
        }

        .locate-btn {
            position: absolute;
            top: 80px;
            left: 10px;
            z-index: 1000;
        }

        .candidate-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .candidate-card:hover {
            background-color: #f8f9fa;
        }

        .candidate-photo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #6c757d;
        }

        .election-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .election-row:hover {
            background-color: #f8f9fa;
        }

        .badge-count {
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <button class="btn btn-light btn-sm lang-toggle shadow" onclick="toggleLang()">
        <span id="langLabel">EN</span>
    </button>

    <button class="btn btn-light btn-sm back-btn shadow" id="backBtn" onclick="backToCounty()">
        <i class="bi bi-arrow-left"></i> <span id="backLabel">返回縣市</span>
    </button>

    <button class="btn btn-light btn-sm locate-btn shadow" onclick="locateUser()">
        <i class="bi bi-geo-alt-fill"></i>
    </button>

    <!-- Election Types Modal -->
    <div class="modal fade" id="electionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="electionModalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="electionModalBody"></div>
            </div>
        </div>
    </div>

    <!-- Candidate List Modal -->
    <div class="modal fade" id="candidateModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="candidateModalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="candidateModalBody"></div>
            </div>
        </div>
    </div>

    <!-- Candidate Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailModalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="detailModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    <script src="js/main.js"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FJ1JR851SJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-FJ1JR851SJ');
    </script>
</body>

</html>
