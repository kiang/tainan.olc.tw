<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 議員選舉 — 全國選區提名策略總覽（台灣民眾黨）</title>
<link rel="stylesheet" href="style.css">
<style>
.summary-header{background:linear-gradient(135deg,#1A9E91,#0D7377);color:#fff;padding:32px;border-radius:14px;margin-bottom:24px}
.summary-header h1{font-size:1.6em}
.summary-header .sub{opacity:.9;margin-top:6px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.kpi .num{font-size:2em;font-weight:800;color:var(--tpp-dark)}
.kpi .lb{font-size:.78em;color:var(--text2);margin-top:2px}
.kpi.green .num{color:var(--tier-a)}.kpi.orange .num{color:#E65100}.kpi.red .num{color:var(--warn)}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters select,.filters input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85em}
.filters input{width:180px}
.zone-table{font-size:.82em}
.zone-table th{position:sticky;top:0;z-index:1;background:#F5F5F5}
.zone-table td,.zone-table th{padding:7px 8px}
.zone-table tr:hover td{background:var(--tpp-light)}
.rec{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:700;color:#fff}
.rec-must{background:var(--tier-a)}.rec-strong{background:var(--tier-b)}.rec-grow{background:var(--tier-c)}
.rec-watch{background:var(--tier-d)}.rec-skip{background:var(--tier-e)}.rec-defend{background:#00838F}
.surplus-bar{display:inline-block;height:14px;border-radius:3px;vertical-align:middle;min-width:2px}
.link-btn{color:var(--tpp-dark);text-decoration:none;font-weight:600}
.link-btn:hover{text-decoration:underline}
.city-group{margin-bottom:24px}
.city-group h3{font-size:1em;color:var(--tpp-dark);margin-bottom:8px;padding:8px 12px;background:var(--tpp-light);border-radius:6px}
.legend-box{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;font-size:.82em}
.legend-box .item{display:flex;align-items:center;gap:4px}
.legend-box .dot{width:12px;height:12px;border-radius:3px;display:inline-block}
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-bar button{padding:8px 20px;border:none;background:transparent;font-size:.9em;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text2);font-weight:500}
.tab-bar button.active{border-bottom-color:var(--tpp);color:var(--tpp-dark);font-weight:700}
.tab-content{display:none}.tab-content.active{display:block}
</style>
</head>
<body>

<div class="summary-header">
  <h1>2026 縣市議員選舉 — 全國選區提名策略總覽</h1>
  <div class="sub">台灣民眾黨 ｜ 基於 2020-2024 選舉數據分析</div>
</div>

<div id="kpis"></div>

<div class="tab-bar" id="tabs">
  <button class="active" data-tab="overview">總覽</button>
  <button data-tab="recommend">提名建議</button>
  <button data-tab="city">各縣市分析</button>
  <button data-tab="all">完整數據</button>
</div>

<div id="tab-overview" class="tab-content active"></div>
<div id="tab-recommend" class="tab-content"></div>
<div id="tab-city" class="tab-content"></div>
<div id="tab-all" class="tab-content"></div>

<footer>
  資料來源：中央選舉委員會選舉資料庫 ｜ 涵蓋選舉：2020不分區、2022議員、2024不分區、2024總統<br>
  注意：提名建議僅供參考，實際決策需考量候選人人選、地方情勢、資源配置等因素。<br>
  資料整理：<a href="https://facebook.com/k.olc.tw" target="_blank" rel="noopener">江明宗</a>
</footer>

<script>
(function(){
const $ = s => document.querySelector(s);
const h = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const fmt = n => Number(n).toLocaleString();

let ZONES = [];

async function init() {
  ZONES = await (await fetch('zones.json')).json();
  // Classify each zone
  ZONES.forEach(z => {
    z.surplus = z.est - z.threshold;
    z.surplusO = z.estO - z.threshold;
    z.canTwo = z.est >= z.threshold * 2;
    z.passBase = z.est >= z.threshold;
    z.passOpt = z.estO >= z.threshold;
    z.hasIncumbent = z.tpp_elected > 0;
    z.had2022 = z.tpp_nominated > 0;
    // Recommendation
    if (z.hasIncumbent) {
      z.rec = 'defend'; z.recLabel = '現任連任';
      z.priority = 1;
    } else if (z.passBase && z.surplus >= z.threshold * 0.5) {
      z.rec = 'must'; z.recLabel = '強力提名';
      z.priority = 2;
    } else if (z.passBase) {
      z.rec = 'strong'; z.recLabel = '建議提名';
      z.priority = 3;
    } else if (z.passOpt) {
      z.rec = 'grow'; z.recLabel = '積極培養';
      z.priority = 4;
    } else if (z.r2024 >= 15) {
      z.rec = 'watch'; z.recLabel = '觀察佈局';
      z.priority = 5;
    } else {
      z.rec = 'skip'; z.recLabel = '暫不提名';
      z.priority = 6;
    }
  });

  renderKPIs();
  renderOverview();
  renderRecommend();
  renderCity();
  renderAll();
  initTabs();
}

function renderKPIs() {
  const total = ZONES.length;
  const pass = ZONES.filter(z => z.passBase).length;
  const incumbent = ZONES.filter(z => z.hasIncumbent).length;
  const must = ZONES.filter(z => z.rec === 'must').length;
  const strong = ZONES.filter(z => z.rec === 'strong').length;
  const grow = ZONES.filter(z => z.rec === 'grow').length;
  const canTwo = ZONES.filter(z => z.canTwo && !z.hasIncumbent).length;
  const totalEst = ZONES.reduce((s,z) => s+z.est, 0);
  $('#kpis').innerHTML = `<div class="kpi-row">
    <div class="kpi"><div class="num">${total}</div><div class="lb">選區總數</div></div>
    <div class="kpi green"><div class="num">${incumbent}</div><div class="lb">現任議員選區</div></div>
    <div class="kpi green"><div class="num">${pass}</div><div class="lb">基本盤過門檻</div></div>
    <div class="kpi green"><div class="num">${must}</div><div class="lb">強力提名</div></div>
    <div class="kpi"><div class="num">${strong}</div><div class="lb">建議提名</div></div>
    <div class="kpi orange"><div class="num">${grow}</div><div class="lb">積極培養</div></div>
    <div class="kpi"><div class="num">${canTwo}</div><div class="lb">可衝雙席</div></div>
    <div class="kpi"><div class="num">${fmt(totalEst)}</div><div class="lb">全國預估票</div></div>
  </div>`;
}

function renderOverview() {
  // Stacked summary by recommendation
  const groups = {};
  const order = ['defend','must','strong','grow','watch','skip'];
  const labels = {defend:'現任連任',must:'強力提名',strong:'建議提名',grow:'積極培養',watch:'觀察佈局',skip:'暫不提名'};
  const colors = {defend:'#00838F',must:'#2E7D32',strong:'#1565C0',grow:'#F57F17',watch:'#6A1B9A',skip:'#9E9E9E'};
  order.forEach(k => groups[k] = []);
  ZONES.forEach(z => groups[z.rec].push(z));

  let html = '<section><h2>提名策略分佈</h2>';
  html += '<div class="legend-box">';
  order.forEach(k => {
    html += `<div class="item"><span class="dot" style="background:${colors[k]}"></span>${labels[k]} ${groups[k].length}</div>`;
  });
  html += '</div>';

  // Bar chart - all zones sorted by surplus ratio
  const sorted = ZONES.filter(z => z.threshold > 0).sort((a,b) => (b.est/b.threshold) - (a.est/a.threshold));
  const chartH = 200;
  const maxRatio = Math.min(Math.max(...sorted.map(z => z.est/z.threshold)), 5);
  // Threshold line position
  const threshLineH = Math.round(1 / maxRatio * chartH);
  html += '<div style="font-size:.85em;color:var(--text2);margin-bottom:6px">各選區基本盤 vs 當選門檻比值（紅線 = 門檻）</div>';
  html += `<div style="position:relative;height:${chartH}px;border-bottom:2px solid var(--border);margin-bottom:4px">`;
  // Threshold reference line
  html += `<div style="position:absolute;bottom:${threshLineH}px;left:0;right:0;border-top:2px dashed var(--warn);z-index:1"></div>`;
  html += `<div style="position:absolute;bottom:${threshLineH + 2}px;right:4px;font-size:.68em;color:var(--warn);font-weight:600">門檻 (1x)</div>`;
  // Bars
  html += `<div style="display:flex;align-items:flex-end;height:100%;gap:1px;padding:0 2px">`;
  const barW = Math.max(Math.floor(900 / sorted.length), 3);
  sorted.forEach(z => {
    const ratio = z.est / z.threshold;
    const barH = Math.round(Math.min(ratio / maxRatio, 1) * chartH);
    const color = colors[z.rec];
    const tip = `${z.zone}\n基本盤: ${fmt(z.est)} / 門檻: ${fmt(z.threshold)}\n比值: ${ratio.toFixed(2)}`;
    html += `<div title="${tip}" style="width:${barW}px;height:${barH}px;background:${color};border-radius:2px 2px 0 0;flex-shrink:0;cursor:pointer" onclick="location.href='zone.html?zone=${z.code}'"></div>`;
  });
  html += '</div></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:.72em;color:var(--text2)"><span>← 高餘裕</span><span>低餘裕 / 未達門檻 →</span></div>';

  // Summary table by group
  order.forEach(k => {
    const g = groups[k];
    if (g.length === 0) return;
    g.sort((a,b) => b.surplus - a.surplus);
    html += `<div style="margin-top:16px"><h3 style="font-size:.95em"><span class="rec rec-${k}">${labels[k]}</span> — ${g.length} 個選區</h3>`;
    html += '<table class="zone-table"><tr><th style="text-align:left">選區</th><th style="text-align:left">區域</th><th>2024政黨</th><th>成長</th><th>預估票</th><th>門檻</th><th>餘裕</th><th></th></tr>';
    g.forEach(z => {
      const surplusStr = z.threshold > 0 ? (z.surplus >= 0 ? `<span class="pos">+${fmt(z.surplus)}</span>` : `<span class="neg">${fmt(z.surplus)}</span>`) : '-';
      html += `<tr><td style="text-align:left">${h(z.zone)}</td><td style="text-align:left">${h(z.areas)}</td><td>${z.r2024}%</td><td class="${z.chg>=0?'pos':'neg'}">${z.chg>=0?'+':''}${z.chg}</td><td>${fmt(z.est)}</td><td>${fmt(z.threshold)}</td><td>${surplusStr}</td><td><a class="link-btn" href="zone.html?zone=${z.code}">詳細</a></td></tr>`;
    });
    html += '</table></div>';
  });
  html += '</section>';
  $('#tab-overview').innerHTML = html;
}

function renderRecommend() {
  // Focus on actionable recommendations
  const defend = ZONES.filter(z => z.rec === 'defend').sort((a,b) => b.est - a.est);
  const must = ZONES.filter(z => z.rec === 'must').sort((a,b) => b.surplus - a.surplus);
  const strong = ZONES.filter(z => z.rec === 'strong').sort((a,b) => b.surplus - a.surplus);
  const grow = ZONES.filter(z => z.rec === 'grow').sort((a,b) => b.surplusO - a.surplusO);
  const twoSeats = ZONES.filter(z => z.canTwo).sort((a,b) => b.est - a.est);

  let html = '<section><h2>提名決策建議</h2>';

  // Priority 1: Defend incumbents
  if (defend.length > 0) {
    html += `<div class="tg tg-A" style="border-color:#00838F"><h3><span class="rec rec-defend">最高優先</span> 現任議員連任 — ${defend.length} 席</h3>`;
    html += '<p class="st">已有當選議員，應全力支持連任，維護既有席次。</p><ul>';
    defend.forEach(z => {
      html += `<li><a class="link-btn" href="zone.html?zone=${z.code}">${h(z.zone)}</a>（${h(z.areas)}）— 現任：${h(z.elected_names.join('、'))}，預估 ${fmt(z.est)} 票，餘裕 +${fmt(z.surplus)}</li>`;
    });
    html += '</ul></div>';
  }

  // Priority 2: Must nominate
  if (must.length > 0) {
    html += `<div class="tg tg-A"><h3><span class="rec rec-must">強力提名</span> 高勝算選區 — ${must.length} 區</h3>`;
    html += '<p class="st">基本盤大幅超過門檻，提名即有高當選機率。應積極尋覓人選。</p><ul>';
    must.forEach(z => {
      let note = '';
      if (z.had2022 && z.tpp_elected === 0) note = `（2022曾參選但落選，需檢討後重新出發）`;
      if (!z.had2022) note = `（2022未提名，首次參選需提早佈局）`;
      html += `<li><a class="link-btn" href="zone.html?zone=${z.code}">${h(z.zone)}</a>（${h(z.areas)}）— 預估 ${fmt(z.est)} 票，門檻 ${fmt(z.threshold)}，餘裕 +${fmt(z.surplus)} ${note}</li>`;
    });
    html += '</ul></div>';
  }

  // Priority 3: Strong recommend
  if (strong.length > 0) {
    html += `<div class="tg tg-B"><h3><span class="rec rec-strong">建議提名</span> 可當選選區 — ${strong.length} 區</h3>`;
    html += '<p class="st">基本盤已過門檻但餘裕較小，需要強力候選人確保轉換率。</p><ul>';
    strong.forEach(z => {
      const convNote = z.conv > 0 ? `，2022轉換率 ${z.conv}%` : '';
      html += `<li><a class="link-btn" href="zone.html?zone=${z.code}">${h(z.zone)}</a>（${h(z.areas)}）— 預估 ${fmt(z.est)} 票，門檻 ${fmt(z.threshold)}，餘裕 +${fmt(z.surplus)}${convNote}</li>`;
    });
    html += '</ul></div>';
  }

  // Two-seat opportunities
  if (twoSeats.length > 0) {
    html += `<div class="tg tg-C"><h3><span class="rec rec-grow">雙席機會</span> 可評估提名 2 人 — ${twoSeats.length} 區</h3>`;
    html += '<p class="st">預估票數超過門檻兩倍，可考慮提名兩位候選人。需注意票源分配策略。</p><ul>';
    twoSeats.forEach(z => {
      const ratio = (z.est / z.threshold).toFixed(1);
      html += `<li><a class="link-btn" href="zone.html?zone=${z.code}">${h(z.zone)}</a>（${h(z.areas)}）— 預估 ${fmt(z.est)} 票 ÷ 門檻 ${fmt(z.threshold)} = ${ratio} 倍${z.hasIncumbent ? '，含現任 ' + h(z.elected_names.join('、')) : ''}</li>`;
    });
    html += '</ul></div>';
  }

  // Priority 4: Grow
  if (grow.length > 0) {
    html += `<div class="tg tg-D"><h3><span class="rec rec-grow">積極培養</span> 潛力選區 — ${grow.length} 區</h3>`;
    html += '<p class="st">基本盤未達門檻但樂觀預估可達，需提早佈局培養候選人。</p><ul>';
    grow.forEach(z => {
      html += `<li><a class="link-btn" href="zone.html?zone=${z.code}">${h(z.zone)}</a>（${h(z.areas)}）— 基本盤 ${fmt(z.est)}，樂觀 ${fmt(z.estO)}，門檻 ${fmt(z.threshold)}，差距 ${fmt(Math.abs(z.surplus))}</li>`;
    });
    html += '</ul></div>';
  }

  // Nomination count summary
  const totalNominate = defend.length + must.length + strong.length;
  const totalGrow = grow.length;
  html += `<div style="margin-top:16px;padding:16px;background:var(--tpp-light);border-radius:8px;font-size:.9em">`;
  html += `<strong>提名總結：</strong>建議提名 <strong>${totalNominate}</strong> 區（現任 ${defend.length} + 強力 ${must.length} + 建議 ${strong.length}），`;
  html += `培養觀察 <strong>${totalGrow}</strong> 區，`;
  html += `雙席機會 <strong>${twoSeats.length}</strong> 區。</div>`;

  html += '</section>';
  $('#tab-recommend').innerHTML = html;
}

function renderCity() {
  const cities = {};
  ZONES.forEach(z => { (cities[z.city] = cities[z.city] || []).push(z); });
  let html = '';
  for (const [city, zs] of Object.entries(cities)) {
    zs.sort((a,b) => a.priority - b.priority || b.surplus - a.surplus);
    const totalEst = zs.reduce((s,z) => s+z.est, 0);
    const nomCount = zs.filter(z => ['defend','must','strong'].includes(z.rec)).length;
    const incumbents = zs.filter(z => z.hasIncumbent).length;

    html += `<section class="city-group"><h2>${h(city)}（${zs.length} 選區，建議提名 ${nomCount}，現任 ${incumbents}）</h2>`;

    // Party landscape bar for the city
    const avgTpp = (zs.reduce((s,z) => s+z.r2024, 0) / zs.length).toFixed(1);
    const avgKmt = (zs.reduce((s,z) => s+z.kmt, 0) / zs.length).toFixed(1);
    const avgDpp = (zs.reduce((s,z) => s+z.dpp, 0) / zs.length).toFixed(1);
    html += `<div style="font-size:.82em;color:var(--text2);margin-bottom:4px">平均政黨票：民進 ${avgDpp}% ／ 國民 ${avgKmt}% ／ 民眾 ${avgTpp}%</div>`;

    html += '<table class="zone-table"><tr><th style="text-align:left">選區</th><th style="text-align:left">區域</th><th>建議</th><th>2024政黨</th><th>成長</th><th>預估票</th><th>門檻</th><th>餘裕</th><th>現任</th><th></th></tr>';
    zs.forEach(z => {
      const surplusStr = z.threshold > 0 ? (z.surplus >= 0 ? `<span class="pos">+${fmt(z.surplus)}</span>` : `<span class="neg">${fmt(z.surplus)}</span>`) : '-';
      const incumbent = z.elected_names.length > 0 ? h(z.elected_names.join('、')) : '-';
      html += `<tr><td style="text-align:left">${h(z.zone)}</td><td style="text-align:left">${h(z.areas)}</td><td><span class="rec rec-${z.rec}">${z.recLabel}</span></td><td>${z.r2024}%</td><td class="${z.chg>=0?'pos':'neg'}">${z.chg>=0?'+':''}${z.chg}</td><td>${fmt(z.est)}</td><td>${fmt(z.threshold)}</td><td>${surplusStr}</td><td>${incumbent}</td><td><a class="link-btn" href="zone.html?zone=${z.code}">詳細</a></td></tr>`;
    });
    html += '</table></section>';
  }
  $('#tab-city').innerHTML = html;
}

function renderAll() {
  let html = '<section><h2>全部選區數據</h2>';
  html += '<div class="filters"><label>篩選：</label><select id="f-city"><option value="">全部縣市</option></select><select id="f-rec"><option value="">全部建議</option><option value="defend">現任連任</option><option value="must">強力提名</option><option value="strong">建議提名</option><option value="grow">積極培養</option><option value="watch">觀察佈局</option><option value="skip">暫不提名</option></select><input id="f-search" placeholder="搜尋選區或區域..."></div>';
  html += '<table class="zone-table" id="all-table"><thead><tr>';
  html += '<th style="text-align:left" data-sort="str">選區</th><th style="text-align:left" data-sort="str">區域</th><th data-sort="str">建議</th>';
  html += '<th data-sort="num">席次</th><th data-sort="num">2024政黨</th><th data-sort="num">2024總統</th><th data-sort="num">成長</th>';
  html += '<th data-sort="num">預估票</th><th data-sort="num">門檻</th><th data-sort="num">餘裕</th>';
  html += '<th data-sort="num">轉換率</th><th style="text-align:left">現任</th><th></th>';
  html += '</tr></thead><tbody id="all-tbody"></tbody></table></section>';
  $('#tab-all').innerHTML = html;

  // Populate city filter
  const cities = [...new Set(ZONES.map(z => z.city))];
  cities.forEach(c => {
    $('#f-city').innerHTML += `<option value="${h(c)}">${h(c)}</option>`;
  });

  renderAllRows(ZONES);

  // Filter handlers
  const applyFilter = () => {
    const city = $('#f-city').value;
    const rec = $('#f-rec').value;
    const search = $('#f-search').value.toLowerCase();
    const filtered = ZONES.filter(z => {
      if (city && z.city !== city) return false;
      if (rec && z.rec !== rec) return false;
      if (search && !z.zone.toLowerCase().includes(search) && !z.areas.toLowerCase().includes(search)) return false;
      return true;
    });
    renderAllRows(filtered);
  };
  $('#f-city').addEventListener('change', applyFilter);
  $('#f-rec').addEventListener('change', applyFilter);
  $('#f-search').addEventListener('input', applyFilter);

  // Sortable headers
  document.querySelectorAll('#all-table th[data-sort]').forEach(th => {
    th.addEventListener('click', () => sortAllTable(th));
  });
}

function renderAllRows(zones) {
  const tbody = $('#all-tbody');
  tbody.innerHTML = zones.map(z => {
    const surplusStr = z.threshold > 0 ? (z.surplus >= 0 ? `<span class="pos">+${fmt(z.surplus)}</span>` : `<span class="neg">${fmt(z.surplus)}</span>`) : '-';
    const incumbent = z.elected_names.length > 0 ? h(z.elected_names.join('、')) : '';
    const convStr = z.conv > 0 ? z.conv + '%' : '-';
    return `<tr data-rec="${z.rec}" data-city="${h(z.city)}"><td style="text-align:left">${h(z.zone)}</td><td style="text-align:left">${h(z.areas)}</td><td><span class="rec rec-${z.rec}">${z.recLabel}</span></td><td>${z.seats}</td><td>${z.r2024}%</td><td>${z.r2024p}%</td><td class="${z.chg>=0?'pos':'neg'}">${z.chg>=0?'+':''}${z.chg}</td><td>${fmt(z.est)}</td><td>${fmt(z.threshold)}</td><td>${surplusStr}</td><td>${convStr}</td><td style="text-align:left">${incumbent}</td><td><a class="link-btn" href="zone.html?zone=${z.code}">詳細</a></td></tr>`;
  }).join('');
}

function sortAllTable(th) {
  const table = th.closest('table');
  const idx = Array.from(th.parentNode.children).indexOf(th);
  const type = th.dataset.sort;
  const tbody = $('#all-tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const asc = table.dataset.sc === String(idx) && table.dataset.sd === 'asc';
  table.dataset.sc = idx; table.dataset.sd = asc ? 'desc' : 'asc';
  rows.sort((a,b) => {
    let av = a.cells[idx]?.textContent.trim().replace(/[%,票+]/g,'') || '';
    let bv = b.cells[idx]?.textContent.trim().replace(/[%,票+]/g,'') || '';
    if (type === 'num') { av = parseFloat(av) || -999; bv = parseFloat(bv) || -999; }
    return (av < bv ? 1 : av > bv ? -1 : 0) * (asc ? -1 : 1);
  });
  rows.forEach(r => tbody.appendChild(r));
  th.parentNode.querySelectorAll('th').forEach((t,i) => {
    t.textContent = t.textContent.replace(/ [▲▼]$/,'');
    if (i === idx) t.textContent += asc ? ' ▲' : ' ▼';
  });
}

function initTabs() {
  document.querySelectorAll('#tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      $(`#tab-${btn.dataset.tab}`).classList.add('active');
    });
  });
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
